<div class="row justify-content-center">
  <div class="col-12 col-lg-8">
    <div class="card sz-card">
      <div class="card-body p-4">
        <h1 class="h3 sz-page-title mb-3">Profile</h1>
        <p class="text-muted">Hello {{user?.name}} this is your profile page.</p>

        <div class="table-responsive mt-4">
          <table class="table align-middle">
            <tbody>
              <tr>
                <th class="w-25 text-muted">Name</th>
                <td class="fw-semibold">{{ user?.name ?? '—' }}</td>
              </tr>
              <tr>
                <th class="text-muted">Email</th>
                <td>{{ user?.email ?? '—' }}</td>
              </tr>
              <tr>
                <th class="text-muted">Role</th>
                <td><span class="badge text-bg-primary">{{ user?.role ?? '—'
                    }}</span></td>
              </tr>
              <tr>
                <th class="text-muted">userId</th>
                <td><code>{{ userIdLabel() }}</code></td>
              </tr>
            </tbody>
          </table>
        </div>

        <button type="button" class="btn btn-outline-danger mt-3"
          (click)="logout()">Logout</button>
      </div>
    </div>
  </div>
</div>
