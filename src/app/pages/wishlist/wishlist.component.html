<div class="d-flex align-items-center gap-3 mb-4">
  <h1 class="h3 sz-page-title mb-0">My Wishlist</h1>
  <span class="badge bg-primary rounded-pill" *ngIf="items.length > 0">
    {{ items.length }}
  </span>
</div>

<div class="row g-4" *ngIf="loading">
  <div class="col-12 col-sm-6 col-lg-4" *ngFor="let s of [1, 2, 3]">
    <div class="card sz-card h-100">
      <div class="sz-skeleton ratio ratio-4x3"></div>
      <div class="card-body">
        <div class="sz-skeleton mb-2" style="height: 18px"></div>
        <div class="sz-skeleton mb-3" style="height: 14px; width: 60%"></div>
        <div class="sz-skeleton" style="height: 36px"></div>
      </div>
    </div>
  </div>
</div>

<div class="row g-4" *ngIf="!loading && items.length > 0">
  <div
    class="col-12 col-sm-6 col-lg-4"
    *ngFor="let item of items; trackBy: trackItem">

    <div class="card sz-card h-100">

      <a [routerLink]="['/products', item.productId]" class="ratio ratio-4x3 d-block">
        <img
          [src]="item.image"
          class="object-fit-cover rounded-top-4"
          [alt]="item.name" />
      </a>

      <div class="card-body d-flex flex-column">

        <div class="small text-muted mb-1">{{ item.category }}</div>
        <h5 class="card-title sz-page-title mb-2">
          <a
            [routerLink]="['/products', item.productId]"
            class="text-decoration-none text-body">
            {{ item.name }}
          </a>
        </h5>

        <div class="d-flex align-items-center gap-3 mb-3">
          <span class="fw-bold text-primary fs-6">
            ${{ item.price | number: '1.2-2' }}
          </span>
          <span class="text-warning small">
            ★ {{ item.rating | number: '1.1-1' }}
          </span>
        </div>

        <div class="d-flex gap-2 mt-auto">

          <button
            class="btn btn-primary btn-sm flex-grow-1"
            (click)="moveToCart(item)"
            [disabled]="isMoving(item.id) || isRemoving(item.id)">
            <span
              *ngIf="isMoving(item.id)"
              class="spinner-border spinner-border-sm me-1"></span>
            <span *ngIf="!isMoving(item.id)">🛒</span>
            Move to Cart
          </button>

          <button
            class="btn btn-outline-danger btn-sm"
            (click)="remove(item)"
            [disabled]="isRemoving(item.id) || isMoving(item.id)"
            title="Remove from wishlist">
            <span
              *ngIf="isRemoving(item.id)"
              class="spinner-border spinner-border-sm"></span>
            <span *ngIf="!isRemoving(item.id)">🗑️</span>
          </button>

        </div>
      </div>
    </div>
  </div>
</div>

<div class="text-center py-5" *ngIf="!loading && items.length === 0">
  <div class="sz-empty-icon mb-3">🤍</div>
  <h4 class="mb-2">Your wishlist is empty</h4>
  <p class="text-muted mb-4">Save the items you love and come back to them anytime.</p>
  <a routerLink="/products" class="btn btn-primary px-4">
    Browse Products
  </a>
</div>
