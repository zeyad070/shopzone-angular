<div class="card sz-card mb-3">
  <div class="card-body">
    <div class="d-flex flex-wrap justify-content-between gap-2 align-items-start">
      <div>
        <div class="text-muted small">Order #{{ order.id }}</div>
        <div class="fw-semibold">
          Placed
          <ng-container *ngIf="order.createdAt; else noDate">{{ order.createdAt | date: 'medium' }}</ng-container>
          <ng-template #noDate>—</ng-template>
        </div>
      </div>
      <span class="badge rounded-pill" [ngClass]="statusClass()">{{ order.status }}</span>
    </div>
    <hr />
    <div class="table-responsive">
      <table class="table table-sm align-middle mb-0">
        <thead>
          <tr>
            <th>Item</th>
            <th class="text-end">Qty</th>
            <th class="text-end">Price</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let line of order.items; trackBy: trackLine">
            <td>
              <div class="d-flex align-items-center gap-2">
                <img
                  *ngIf="line.image"
                  [src]="line.image"
                  alt=""
                  class="rounded border"
                  width="40"
                  height="40"
                  style="object-fit: cover"
                />
                <span>{{ line.name }}</span>
              </div>
            </td>
            <td class="text-end">{{ line.quantity }}</td>
            <td class="text-end">${{ line.price | number: '1.2-2' }}</td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="d-flex justify-content-end mt-2 fw-bold">
      Total: ${{ order.total | number: '1.2-2' }}
    </div>
  </div>
</div>
